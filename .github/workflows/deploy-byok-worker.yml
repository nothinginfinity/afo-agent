name: deploy-byok-worker

on:
  workflow_dispatch:
    inputs:
      script_name:
        description: Cloudflare Worker script name
        required: true
        default: afo-byok-agent-gateway
      mcp_url:
        description: AFO Agent Gateway MCP URL
        required: true
        default: https://afo-agent-gateway.jaredtechfit.workers.dev/mcp
      default_anthropic_model:
        description: Default Anthropic model shown by the BYOK broker
        required: true
        default: claude-sonnet-4-6
      anthropic_version:
        description: Anthropic API version header
        required: true
        default: "2023-06-01"
  push:
    branches: [main]
    paths:
      - 'worker/byok/index.js'
      - '.github/workflows/deploy-byok-worker.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: test -f worker/byok/index.js

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Resolve deploy inputs
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "script_name=${{ inputs.script_name }}" >> "$GITHUB_OUTPUT"
            echo "mcp_url=${{ inputs.mcp_url }}" >> "$GITHUB_OUTPUT"
            echo "default_anthropic_model=${{ inputs.default_anthropic_model }}" >> "$GITHUB_OUTPUT"
            echo "anthropic_version=${{ inputs.anthropic_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "script_name=afo-byok-agent-gateway" >> "$GITHUB_OUTPUT"
            echo "mcp_url=https://afo-agent-gateway.jaredtechfit.workers.dev/mcp" >> "$GITHUB_OUTPUT"
            echo "default_anthropic_model=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"
            echo "anthropic_version=2023-06-01" >> "$GITHUB_OUTPUT"
          fi
      - name: Write BYOK Wrangler config
        run: |
          cat > wrangler.byok.toml <<EOF
          name = "${{ steps.vars.outputs.script_name }}"
          main = "worker/byok/index.js"
          compatibility_date = "2026-06-19"

          [vars]
          AFO_MCP_URL = "${{ steps.vars.outputs.mcp_url }}"
          DEFAULT_ANTHROPIC_MODEL = "${{ steps.vars.outputs.default_anthropic_model }}"
          ANTHROPIC_VERSION = "${{ steps.vars.outputs.anthropic_version }}"

          [[d1_databases]]
          binding = "AFO_DB"
          database_name = "afo-agent-db"
          database_id = "988f3f2c-5952-4eb7-8594-ccba55e72af2"
          EOF
      - name: Deploy BYOK Worker
        run: npx wrangler deploy --config wrangler.byok.toml
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      - name: Deployment summary
        run: |
          echo "BYOK Worker deployed: ${{ steps.vars.outputs.script_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Health URL: https://${{ steps.vars.outputs.script_name }}.jaredtechfit.workers.dev/health" >> "$GITHUB_STEP_SUMMARY"
          echo "Chat URL: https://${{ steps.vars.outputs.script_name }}.jaredtechfit.workers.dev/api/byok/chat" >> "$GITHUB_STEP_SUMMARY"
          echo "Models URL: https://${{ steps.vars.outputs.script_name }}.jaredtechfit.workers.dev/api/byok/models" >> "$GITHUB_STEP_SUMMARY"
