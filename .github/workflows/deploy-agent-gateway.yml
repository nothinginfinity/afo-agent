name: deploy-agent-gateway

on:
  workflow_dispatch:
    inputs:
      deploy_note:
        description: Manual deploy note
        required: false
        default: deploy patched AFO Agent Gateway

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy afo-agent-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Apply Zip bridge patch
        run: node scripts/apply-zip-bridge-to-standalone.mjs

      - name: Check gateway syntax
        run: node --check worker/standalone/index.js

      - name: Write standalone deploy config
        run: |
          cat > wrangler.agent-gateway.toml <<'EOF'
          name = "afo-agent-gateway"
          main = "worker/standalone/index.js"
          compatibility_date = "2026-06-19"

          [vars]
          AFO_AGENT_VERSION = "0.3.0"

          [[d1_databases]]
          binding = "AFO_DB"
          database_name = "afo-agent-db"
          database_id = "988f3f2c-5952-4eb7-8594-ccba55e72af2"

          [[r2_buckets]]
          binding = "AFO_ARTIFACTS"
          bucket_name = "afo-agent-artifacts"
          EOF

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Agent Gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: wrangler deploy --config wrangler.agent-gateway.toml --keep-vars
