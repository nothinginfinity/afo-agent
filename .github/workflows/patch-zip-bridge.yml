name: patch-zip-bridge

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply Zip bridge patch
        run: node scripts/apply-zip-bridge-to-standalone.mjs

      - name: Check JavaScript syntax
        run: node --check worker/standalone/index.js

      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add worker/standalone/index.js
          git commit -m "feat: connect Zip Gateway v2 to Agent Gateway"
          git push
